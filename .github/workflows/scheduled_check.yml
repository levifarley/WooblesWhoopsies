name: Frequent Website Monitor (Arizona Time)

on:
  schedule:
    # Rule 1: Covers the daytime runs (16:00, 19:00, 22:00 UTC) 
    # This matches 9:00 AM, 12:00 PM, and 3:00 PM Arizona time
    - cron: '0 16,19,22 * * *'
    
    # Rule 2: Covers the evening runs (01:00, 04:00 UTC)
    # This matches 6:00 PM and 9:00 PM Arizona time
    - cron: '0 1,4 * * *'
    
  workflow_dispatch: # Keeps the manual test button active

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Restore Website Cache State
      id: cache-state
      uses: actions/cache@v4
      with:
        path: last_known_state.txt
        key: website-state-${{ github.run_id }}
        restore-keys: |
          website-state-

    - name: Install Runtime Dependencies
      run: npm install @google/genai node-fetch

    - name: Execute Monitor Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
      run: node monitor.js

    - name: Save Updated Website Cache State
      uses: actions/cache/save@v4
      with:
        path: last_known_state.txt
        key: website-state-${{ github.run_id }}
