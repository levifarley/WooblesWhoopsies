name: Frequent Website Monitor (Arizona Time)

on:
  schedule:
    # 9:00 AM, 12:00 PM, 3:00 PM Arizona Time
    - cron: '0 16,19,22 * * *'
    # 6:00 PM, 9:00 PM Arizona Time
    - cron: '0 1,4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Download Previous Website State
      uses: actions/download-artifact@v4
      with:
        name: website-baseline-file
        path: .
      continue-on-error: true # Safe fallback for the very first run when no artifact exists yet

    - name: Install Runtime Dependencies
      run: npm install @google/genai node-fetch

    - name: Execute Monitor Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
      run: node monitor.js

    - name: Upload New Website State
      uses: actions/upload-artifact@v4
      with:
        name: website-baseline-file
        path: last_known_state.txt
        retention-days: 3 # Keeps storage clean automatically
        overwrite: true   # Forces GitHub to completely replace the file with the newest version
