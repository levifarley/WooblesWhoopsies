name: Twice Daily Website Monitor (Arizona Time)

on:
  schedule:
    # 01:00 UTC corresponds to 6:00 PM Arizona Time
    # 16:00 UTC corresponds to 9:00 AM Arizona Time
    - cron: '0 1,16 * * *'
  workflow_dispatch:

permissions:
  contents: read # No longer needs write permissions!

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Restore Website Cache State
      id: cache-state
      uses: actions/cache@v4
      with:
        path: last_known_state.txt
        key: website-state-${{ github.run_id }} # Generates a rolling key step
        restore-keys: |
          website-state-

    - name: Install Runtime Dependencies
      run: npm install @google/genai node-fetch

    - name: Execute Monitor Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
      run: node monitor.js

    - name: Save Updated Website Cache State
      uses: actions/cache/save@v4
      with:
        path: last_known_state.txt
        key: website-state-${{ github.run_id }}
