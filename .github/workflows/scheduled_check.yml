name: Frequent Website Monitor (Arizona Time)

on:
  schedule:
    # 9:00 AM, 12:00 PM, 3:00 PM Arizona Time
    - cron: '0 16,19,22 * * *'
    # 6:00 PM, 9:00 PM Arizona Time
    - cron: '0 1,4 * * *'
  workflow_dispatch:

permissions:
  contents: write # Grants permission to push the file updates back to the repo

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetches full history so git rebase works perfectly

    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Runtime Dependencies
      run: npm install @google/genai node-fetch

    - name: Execute Monitor Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
      run: node monitor.js

    - name: Commit and Push Updated State Cache
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add last_known_state.txt
        
        # Only commit and push if the file actually changed
        if ! git diff --cached --quiet; then
          git commit -m "Update cache baseline state [skip ci]"
          git pull --rebase origin main
          git push origin main
        else
          echo "No internal file changes detected. Skipping repository commit."
        fi
