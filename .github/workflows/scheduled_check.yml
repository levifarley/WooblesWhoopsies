name: Twice Daily Website Monitor (Arizona Time)

on:
  schedule:
    # 01:00 UTC corresponds to 6:00 PM Arizona Time
    # 16:00 UTC corresponds to 9:00 AM Arizona Time
    - cron: '0 1,16 * * *'
  workflow_dispatch: # Enables a manual execution button in the GitHub UI for easy debugging

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Baseline
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Runtime Dependencies
      run: npm install @google/genai node-fetch

    - name: Execute Monitor Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
      run: node monitor.js

    - name: Commit and Push Updated State Cache
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add last_known_state.txt
        git commit -m "Update cache baseline state [skip ci]" || exit 0
        git pull --rebase origin main
        git push
